# Experimental: nginx in front of the dashboard origin (e.g. sitio-staging.artr.com.br).
# Traefik → nginx → sitio-dashboard Service. API stays on sitio-api-staging (TinyAuth only there).
#
# Option 4 (TinyAuth returning 307 to Traefik on /api/auth/traefik) applies to the Traefik↔TinyAuth
# hop; fetch() to the API usually still ends as 401/307+CORS unless you rely on SPA redirect (see
# src/lib/api-client.ts + tinyauth-login.ts).
#
# Replace UPSTREAM with the in-cluster dashboard Service, e.g.:
#   proxy_pass http://sitio-dashboard.sitio-staging.svc.cluster.local;
#
server {
    listen 80;
    server_name _;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://UPSTREAM:80;
    }
}
