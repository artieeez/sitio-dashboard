name: Build and push Docker image (staging)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: vcp.ocir.io
  IMAGE_NAME: sitio-dashboard
  VITE_API_URL: https://sitio-api-staging.artr.com.br/api

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - name: Image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=staging-latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          provenance: false
          sbom: false
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: artieeez/artr-gitops
          token: ${{ secrets.ARTR_GITOPS_REPO_TOKEN }}
          path: artr-gitops

      - name: Update dashboard image tag in GitOps
        env:
          SHORT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHORT_SHA::7}"
          sed -i "s|image: vcp.ocir.io/axtvnrdemzo7/sitio-dashboard:.*|image: vcp.ocir.io/axtvnrdemzo7/sitio-dashboard:sha-${SHORT_SHA}|" artr-gitops/apps/sitio-staging/sitio-dashboard/deployment.yaml

      - name: Commit and push GitOps change
        run: |
          cd artr-gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/sitio-staging/sitio-dashboard/deployment.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore(gitops): bump sitio-dashboard image to sha-${GITHUB_SHA::7}"
          git push origin HEAD
